<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e1117">
<title>Daily Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1117;
    --surface: #161b26;
    --surface2: #1e2536;
    --border: rgba(255,255,255,0.08);
    --accent1: #e8c97e;
    --accent2: #7eb8e8;
    --accent3: #a78bfa;
    --text: #e8e6e0;
    --muted: #6b7280;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    min-height: 100vh;
  }

  header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg);
  }

  .date-block h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .date-block p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .progress-ring-wrap {
    position: relative;
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }

  .progress-ring-wrap svg {
    transform: rotate(-90deg);
    width: 52px;
    height: 52px;
  }

  .ring-bg  { fill: none; stroke: var(--surface2); stroke-width: 4; }
  .ring-fill {
    fill: none;
    stroke: var(--accent1);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 138.2;
    stroke-dashoffset: 138.2;
    transition: stroke-dashoffset 0.5s ease;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent1);
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }

  main::-webkit-scrollbar { display: none; }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 14px 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .tasks  .section-icon { background: rgba(232,201,126,0.15); }
  .comms  .section-icon { background: rgba(126,184,232,0.15); }
  .home   .section-icon { background: rgba(167,139,250,0.15); }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .section-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .item:last-child { border-bottom: none; }
  .item.done { background: rgba(255,255,255,0.02); }
  .item.done .item-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .tasks  .check { border-color: rgba(232,201,126,0.5); }
  .comms  .check { border-color: rgba(126,184,232,0.5); }
  .home   .check { border-color: rgba(167,139,250,0.5); }

  .tasks  .item.done .check { background: var(--accent1); border-color: var(--accent1); }
  .comms  .item.done .check { background: var(--accent2); border-color: var(--accent2); }
  .home   .item.done .check { background: var(--accent3); border-color: var(--accent3); }

  .check svg { opacity: 0; transition: opacity 0.2s; }
  .item.done .check svg { opacity: 1; }

  .item-body { flex: 1; min-width: 0; }

  .item-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .tasks  .item-label { color: var(--accent1); }
  .comms  .item-label { color: var(--accent2); }
  .home   .item-label { color: var(--accent3); }

  .item-text {
    font-size: 14px;
    line-height: 1.45;
    color: var(--text);
    transition: color 0.2s;
    word-break: break-word;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 0 0 6px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    opacity: 0.4;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  .add-circle {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px dashed currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    line-height: 1;
    flex-shrink: 0;
  }

  .quote {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 24px 16px;
    font-style: italic;
    flex-shrink: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: flex-end;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px 22px 0 0;
    width: 100%;
    padding: 22px 18px 40px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 14px; }

  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 14px;
    font-size: 16px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
    -webkit-appearance: none;
    appearance: none;
  }

  .modal input:focus { border-color: rgba(255,255,255,0.2); }

  .modal-btns { display: flex; gap: 10px; }

  .btn-cancel {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }

  .btn-confirm {
    flex: 2;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    color: #0e1117;
  }

  .btn-confirm.tasks { background: var(--accent1); }
  .btn-confirm.comms { background: var(--accent2); }
  .btn-confirm.home  { background: var(--accent3); }
</style>
</head>
<body>

<header>
  <div class="date-block">
    <h1 id="dayName">Today</h1>
    <p id="fullDate"></p>
  </div>
  <div class="progress-ring-wrap">
    <svg viewBox="0 0 52 52">
      <circle class="ring-bg"   cx="26" cy="26" r="22"/>
      <circle class="ring-fill" cx="26" cy="26" r="22" id="ringArc"/>
    </svg>
    <span class="ring-label" id="ringPct">0%</span>
  </div>
</header>

<main>
  <div class="section tasks">
    <div class="section-header">
      <div class="section-icon">🎯</div>
      <span class="section-title">Top Priorities</span>
      <span class="section-count" id="cnt-tasks">0/3</span>
    </div>
    <div id="list-tasks"></div>
    <button class="add-btn" onclick="openModal('tasks')">
      <span class="add-circle">+</span> Add priority task
    </button>
  </div>

  <div class="section comms">
    <div class="section-header">
      <div class="section-icon">✉️</div>
      <span class="section-title">Communications</span>
      <span class="section-count" id="cnt-comms">0/3</span>
    </div>
    <div id="list-comms"></div>
    <button class="add-btn" onclick="openModal('comms')">
      <span class="add-circle">+</span> Add message
    </button>
  </div>

  <div class="section home">
    <div class="section-header">
      <div class="section-icon">🏠</div>
      <span class="section-title">Home Tasks</span>
      <span class="section-count" id="cnt-home">0/3</span>
    </div>
    <div id="list-home"></div>
    <button class="add-btn" onclick="openModal('home')">
      <span class="add-circle">+</span> Add home task
    </button>
  </div>
</main>

<p class="quote" id="quoteEl"></p>

<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="modal">
    <h3 id="modalTitle">Add Task</h3>
    <input id="modalInput" type="text" placeholder="Describe the task…" maxlength="120"
           onkeydown="if(event.key==='Enter')confirmAdd()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm tasks" id="confirmBtn" onclick="confirmAdd()">Add</button>
    </div>
  </div>
</div>

<script>
var CFG = {
  tasks: { labels: ['P1 · Critical','P2 · Important','P3 · Nice to do'] },
  comms: { labels: ['Send first','Send second','Send third'] },
  home:  { labels: ['Do first','Do second','Do third'] }
};

var QUOTES = [
  "Small steps every day lead to big results.",
  "Done is better than perfect.",
  "Focus on progress, not perfection.",
  "One task at a time — you've got this.",
  "Your future self will thank you.",
  "Clarity and action bring results.",
  "Make today count."
];

var state = { tasks:[], comms:[], home:[] };

function uid() { return Math.random().toString(36).slice(2,8); }

function loadState() {
  try {
    var raw = localStorage.getItem('dp4');
    if (!raw) return false;
    var d = JSON.parse(raw);
    if (d.date !== new Date().toDateString()) return false;
    state = d.data;
    return true;
  } catch(e) { return false; }
}

function saveState() {
  try {
    localStorage.setItem('dp4', JSON.stringify({
      date: new Date().toDateString(),
      data: state
    }));
  } catch(e) {}
}

if (!loadState()) {
  state.tasks = [
    { id:uid(), text:'Review morning emails', done:false },
    { id:uid(), text:'Finish project proposal', done:false },
    { id:uid(), text:'Team check-in call', done:false }
  ];
  state.comms = [
    { id:uid(), text:'Reply to client inquiry', done:false },
    { id:uid(), text:'Send weekly update to team', done:false },
    { id:uid(), text:'Follow up with vendor', done:false }
  ];
  state.home = [
    { id:uid(), text:'Grocery run', done:false },
    { id:uid(), text:'Tidy living room', done:false },
    { id:uid(), text:'Prepare dinner', done:false }
  ];
}

(function(){
  var now = new Date();
  document.getElementById('dayName').textContent =
    now.toLocaleDateString('en-US',{weekday:'long'});
  document.getElementById('fullDate').textContent =
    now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('quoteEl').textContent =
    QUOTES[now.getDate() % QUOTES.length];
})();

function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSection(sec) {
  var list = document.getElementById('list-'+sec);
  var items = state[sec].slice(0,3);
  var labels = CFG[sec].labels;
  var html = '';
  for (var i=0; i<items.length; i++) {
    var item = items[i];
    html += '<div class="item'+(item.done?' done':'')+'">';
    html += '<div class="check" onclick="toggle(\''+sec+'\',\''+item.id+'\')">';
    html += '<svg width="11" height="9" viewBox="0 0 11 9" fill="none">';
    html += '<path d="M1 4.5l3 3 6-7" stroke="#0e1117" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    html += '</svg></div>';
    html += '<div class="item-body">';
    html += '<div class="item-label">'+labels[i]+'</div>';
    html += '<div class="item-text">'+esc(item.text)+'</div>';
    html += '</div>';
    html += '<button class="del-btn" onclick="delItem(\''+sec+'\',\''+item.id+'\')">✕</button>';
    html += '</div>';
  }
  list.innerHTML = html;
  var done = 0;
  for (var j=0; j<items.length; j++) { if(items[j].done) done++; }
  document.getElementById('cnt-'+sec).textContent = done+'/'+items.length;
}

function renderAll() {
  renderSection('tasks');
  renderSection('comms');
  renderSection('home');
  updateRing();
  saveState();
}

function updateRing() {
  var all = state.tasks.slice(0,3).concat(state.comms.slice(0,3)).concat(state.home.slice(0,3));
  var total = all.length;
  var done = 0;
  for (var i=0; i<all.length; i++) { if(all[i].done) done++; }
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('ringArc').style.strokeDashoffset = 138.2 - (pct/100)*138.2;
  document.getElementById('ringPct').textContent = pct+'%';
}

function toggle(sec, id) {
  for (var i=0; i<state[sec].length; i++) {
    if (state[sec][i].id===id) { state[sec][i].done = !state[sec][i].done; break; }
  }
  renderAll();
}

function delItem(sec, id) {
  state[sec] = state[sec].filter(function(i){ return i.id!==id; });
  renderAll();
}

var currentSec = null;

function openModal(sec) {
  currentSec = sec;
  var titles = { tasks:'Add Priority Task', comms:'Add Communication', home:'Add Home Task' };
  document.getElementById('modalTitle').textContent = titles[sec];
  document.getElementById('confirmBtn').className = 'btn-confirm '+sec;
  document.getElementById('modalInput').value = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('modalInput').focus(); }, 320);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  currentSec = null;
}

function outsideClose(e) {
  if (e.target===document.getElementById('overlay')) closeModal();
}

function confirmAdd() {
  var text = document.getElementById('modalInput').value.trim();
  if (!text || !currentSec) return;
  if (state[currentSec].length >= 3) state[currentSec].splice(2,1);
  state[currentSec].push({ id:uid(), text:text, done:false });
  closeModal();
  renderAll();
}

renderAll();
</script>
</body>
</html>
